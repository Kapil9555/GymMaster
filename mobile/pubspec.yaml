name: gym_master
description: GymMaster - Complete Gym Management Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  dio: ^5.4.0
  go_router: ^13.0.0
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.0.7
  url_launcher: ^6.2.3
  intl: ^0.19.0
  fl_chart: ^0.66.2
  cached_network_image: ^3.3.1
  flutter_local_notifications: ^17.0.0
  path_provider: ^2.1.2
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0
  flutter_slidable: ^3.0.1
  pin_code_fields: ^8.0.1
  google_fonts: ^6.1.0
  badges: ^3.1.2
  percent_indicator: ^4.2.3
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.1
  timeago: ^3.6.1
  pdf: ^3.10.8
  printing: ^5.12.0
  share_plus: ^7.2.2
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
